version: 2
updates:
  # Gradle dependencies (reads gradle/libs.versions.toml + build.gradle.kts).
  - package-ecosystem: gradle
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      androidx:
        patterns: ["androidx.*"]

  # GitHub Actions used by the workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
